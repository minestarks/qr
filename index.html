<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint a QR Code</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        #error {
            color: #cc0000;
            margin-top: 0.5rem;
        }
        #qr-svg {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><path d="M12.1.5l3.4 3.4-10 10H2.1v-3.4z" fill="black" stroke="white" stroke-width=".5"/></svg>') 0 16, crosshair;
        }
        #color-picker {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        #color-picker div {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div style="display:flex;gap:1rem;align-items:flex-start">
      <div id="qr-svg"></div>
      <div id="color-picker" style="margin-top:16px">
        <div data-color="#0000aa" style="background:#0000aa;border:3px solid #ff0000" title="Dark"></div>
        <div data-color="#ddeeff" style="background:#ddeeff;border:3px solid transparent" title="Light"></div>
      </div>
    </div>
    <p id="encoded-url" style="font-size:0.85rem;color:#333;font-family:monospace;word-break:break-all;margin-top:1rem"></p>
    <p id="error" style="color:#cc0000;font-size:0.85rem"></p>
    <p style="font-size:0.85rem"><a href="./" id="reset-link">Reset</a></p>

    <script src="dist/qrcodegen.js"></script>
    <script src="dist/demo.js"></script>
</body>
</html>
